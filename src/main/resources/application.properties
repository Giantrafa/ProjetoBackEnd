spring.application.name=medevent-api

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/medevent?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

api.security.jwt.secret=${JWT_SECRET:medevent-secret-key-change-this-value}
api.security.jwt.expiration-hours=${JWT_EXPIRATION_HOURS:8}
