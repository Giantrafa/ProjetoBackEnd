spring.application.name=autoshop-pro-api

# Supabase / PostgreSQL
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# HikariCP — limites para Supabase free tier
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# JWT
api.security.jwt.secret=${JWT_SECRET}
api.security.jwt.expiration-hours=${JWT_EXPIRATION_HOURS:8}

# Error responses — expose message field so the frontend can display it
spring.web.error.include-message=always

# Frontend URL (used in password reset email link)
app.frontend-url=${FRONTEND_URL:http://localhost:3000}
app.mail.from=${MAIL_FROM:noreply@autoshoppro.com}

# SMTP — desativado (configure MAIL_HOST, MAIL_PORT, MAIL_USERNAME, MAIL_PASSWORD no .env)
# spring.mail.host=${MAIL_HOST}
# spring.mail.port=${MAIL_PORT:587}
# spring.mail.username=${MAIL_USERNAME}
# spring.mail.password=${MAIL_PASSWORD}
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
